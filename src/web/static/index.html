<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetsTranscriber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Literata:opsz,wght@7..72,500;7..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/common.css?v=1.1.1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>〰</text></svg>">
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">〰</div>
        <h1>LetsTranscriber</h1>
      </div>
      <p class="tagline">Голосовые и аудио → текст на русском</p>
      <nav class="nav" aria-label="Разделы">
        <a href="/" class="active">Транскрипция</a>
        <a href="/history">История</a>
      </nav>
    </header>

    <section class="card" aria-labelledby="auth-label">
      <span class="card-label" id="auth-label">Доступ</span>
      <label class="field-label" for="api-key">API ключ</label>
      <input type="text" id="api-key" placeholder="Получите ключ или вставьте свой" autocomplete="off">
      <button type="button" class="btn btn-secondary btn-sm" id="register-btn">Получить ключ</button>
      <p class="status" id="auth-status" role="status"></p>
    </section>

    <section class="card" aria-labelledby="upload-label">
      <span class="card-label" id="upload-label">Новая транскрипция</span>

      <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Загрузить аудиофайл">
        <div class="drop-zone-icon" aria-hidden="true">🎙</div>
        <p class="drop-zone-text"><strong>Выберите файл</strong> или перетащите сюда</p>
        <input type="file" id="file-input" accept="audio/*,.ogg,.opus,.mp3,.m4a,.wav,.webm,.aac,.flac" hidden>
      </div>
      <p class="file-hint" id="file-name"></p>

      <div class="row">
        <div>
          <label class="field-label" for="preset">Качество</label>
          <select id="preset">
            <option value="fast">Быстро</option>
            <option value="balanced" selected>Баланс</option>
            <option value="quality">Максимум</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="language">Язык</label>
          <select id="language">
            <option value="ru" selected>Русский</option>
            <option value="auto">Авто</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="save" checked>
        <label for="save">Сохранить в историю</label>
      </div>

      <button type="button" class="btn btn-primary" id="transcribe-btn">Распознать</button>

      <div class="progress-panel" id="progress-panel" aria-live="polite">
        <div class="waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="progress-header">
          <span class="progress-stage">Подготовка</span>
          <span class="progress-pct">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="progress-fill"></div>
        </div>
        <p class="preview-text"></p>
      </div>

      <p class="status" id="status" role="status"></p>
    </section>

    <section class="card" aria-labelledby="result-label">
      <span class="card-label" id="result-label">Результат</span>
      <div class="result-box empty" id="result">Текст появится здесь</div>
      <p class="meta-line" id="meta"></p>
      <button type="button" class="btn btn-secondary btn-sm" id="copy-btn" style="display:none;margin-top:0.75rem">Копировать</button>
    </section>
  </div>

  <script type="module">
    import {
      bindApiKeyInput, submitJob, pollJob, createProgressController, formatMeta
    } from '/static/app.js';

    bindApiKeyInput('api-key', 'auth-status', 'register-btn');

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progress = createProgressController('progress-panel');
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      const mb = (file.size / 1024 / 1024).toFixed(2);
      document.getElementById('file-name').textContent = `${file.name} · ${mb} MB`;
    }

    document.getElementById('transcribe-btn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const meta = document.getElementById('meta');
      const copyBtn = document.getElementById('copy-btn');
      const btn = document.getElementById('transcribe-btn');

      if (!selectedFile) {
        status.textContent = 'Сначала выберите аудиофайл';
        status.className = 'status error';
        return;
      }

      btn.disabled = true;
      status.textContent = '';
      result.classList.add('empty');
      result.textContent = 'Распознаём…';
      meta.textContent = '';
      copyBtn.style.display = 'none';
      progress.show();
      progress.update({ progress_percent: 0, progress_stage: 'queued' });

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('preset', document.getElementById('preset').value);
      form.append('language', document.getElementById('language').value);
      form.append('save', document.getElementById('save').checked);
      form.append('response_format', 'json');
      form.append('source', 'web');

      try {
        const job = await submitJob(form);
        const data = await pollJob(job.job_id, {
          onProgress: (d) => {
            progress.update(d);
            const track = document.querySelector('.progress-track');
            if (track) track.setAttribute('aria-valuenow', Math.round(d.progress_percent || 0));
            if (d.partial_text) {
              result.classList.remove('empty');
              result.textContent = d.partial_text;
            }
          },
        });

        const text = data.text || '(пусто)';
        result.classList.remove('empty');
        result.textContent = text;
        meta.textContent = formatMeta(data.meta || data.result_meta || {}, { saved: data.saved });
        copyBtn.style.display = 'inline-flex';
        copyBtn.onclick = () => navigator.clipboard.writeText(text);
        status.textContent = 'Готово';
        status.className = 'status ok';
      } catch (e) {
        status.textContent = e.message;
        status.className = 'status error';
        result.classList.add('empty');
        result.textContent = 'Текст появится здесь';
      } finally {
        progress.hide();
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
