<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История — LetsTranscriber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Literata:opsz,wght@7..72,500;7..72,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/common.css?v=1.1.1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>〰</text></svg>">
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">〰</div>
        <h1>LetsTranscriber</h1>
      </div>
      <p class="tagline">Архив распознанных записей</p>
      <nav class="nav" aria-label="Разделы">
        <a href="/">Транскрипция</a>
        <a href="/history" class="active">История</a>
      </nav>
    </header>

    <section class="card">
      <span class="card-label">Поиск</span>
      <label class="field-label" for="api-key">API ключ</label>
      <input type="text" id="api-key" placeholder="Вставьте API ключ" autocomplete="off">
      <div class="toolbar">
        <input type="search" id="search" placeholder="Найти по тексту…">
        <button type="button" class="btn btn-primary btn-sm" id="search-btn">Найти</button>
        <button type="button" class="btn btn-secondary btn-sm" id="list-btn">Все</button>
      </div>
      <p class="status" id="status" role="status"></p>
      <div id="list"></div>
      <div class="pagination">
        <button type="button" class="btn btn-secondary btn-sm" id="prev-btn" disabled aria-label="Предыдущая">←</button>
        <span class="meta-line" id="page-info" style="margin:0">—</span>
        <button type="button" class="btn btn-secondary btn-sm" id="next-btn" disabled aria-label="Следующая">→</button>
      </div>
    </section>

    <section class="card" id="detail-card" style="display:none">
      <span class="card-label">Запись</span>
      <div class="result-box" id="detail"></div>
      <p class="meta-line" id="detail-meta"></p>
      <button type="button" class="btn btn-secondary btn-sm" id="copy-btn" style="margin-top:0.75rem">Копировать</button>
    </section>
  </div>

  <script type="module">
    import {
      bindApiKeyInput, apiHeaders, escapeHtml, formatDuration
    } from '/static/app.js';

    bindApiKeyInput('api-key');

    let page = 1;
    let total = 0;
    const limit = 20;
    let searchQuery = '';

    function formatItemMeta(item) {
      const m = item.meta || {};
      return [
        item.created_at?.slice(0, 16).replace('T', ' '),
        item.source,
        m.preset,
        m.duration != null ? formatDuration(m.duration) : null,
      ].filter(Boolean).join(' · ');
    }

    async function loadList() {
      const status = document.getElementById('status');
      const list = document.getElementById('list');
      status.textContent = 'Загрузка…';
      status.className = 'status';

      try {
        const url = searchQuery
          ? `/v1/history/search?q=${encodeURIComponent(searchQuery)}&page=${page}&limit=${limit}`
          : `/v1/history?page=${page}&limit=${limit}`;
        const res = await fetch(url, { headers: apiHeaders() });
        const data = await res.json();
        if (!res.ok) throw new Error(typeof data.detail === 'string' ? data.detail : 'Ошибка');

        total = data.total;
        list.innerHTML = data.items.length
          ? data.items.map(item => `
              <article class="history-item" data-id="${item.id}" tabindex="0" role="button">
                <p class="history-item-text">${escapeHtml(item.text)}</p>
                <p class="history-item-meta">
                  <span class="badge">${escapeHtml(item.source || 'api')}</span>
                  ${escapeHtml(formatItemMeta(item))}
                </p>
              </article>`).join('')
          : '<p class="empty-state">Ничего не найдено</p>';

        list.querySelectorAll('.history-item').forEach(el => {
          const open = () => loadDetail(el.dataset.id);
          el.addEventListener('click', open);
          el.addEventListener('keydown', (e) => { if (e.key === 'Enter') open(); });
        });

        document.getElementById('page-info').textContent = `Стр. ${page} · ${total} записей`;
        document.getElementById('prev-btn').disabled = page <= 1;
        document.getElementById('next-btn').disabled = page * limit >= total;
        status.textContent = '';
      } catch (e) {
        status.textContent = e.message;
        status.className = 'status error';
      }
    }

    async function loadDetail(id) {
      const card = document.getElementById('detail-card');
      try {
        const res = await fetch(`/v1/history/${id}`, { headers: apiHeaders() });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка');
        document.getElementById('detail').textContent = data.text;
        document.getElementById('detail-meta').textContent = formatItemMeta(data);
        document.getElementById('copy-btn').onclick = () => navigator.clipboard.writeText(data.text);
        card.style.display = 'block';
        card.scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        document.getElementById('status').textContent = e.message;
        document.getElementById('status').className = 'status error';
      }
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      searchQuery = document.getElementById('search').value.trim();
      page = 1;
      loadList();
    });
    document.getElementById('list-btn').addEventListener('click', () => {
      searchQuery = '';
      document.getElementById('search').value = '';
      page = 1;
      loadList();
    });
    document.getElementById('prev-btn').addEventListener('click', () => { page--; loadList(); });
    document.getElementById('next-btn').addEventListener('click', () => { page++; loadList(); });
    document.getElementById('search').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    if (localStorage.getItem('transcribe_api_key')) loadList();
  </script>
</body>
</html>
