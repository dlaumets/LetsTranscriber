services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transcribe
      POSTGRES_USER: transcribe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-transcribe}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcribe -d transcribe"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://transcribe:${DB_PASSWORD:-transcribe}@db:5432/transcribe
    volumes:
      - ./models-cache:/root/.cache/huggingface
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    command: python -m src.bot.main
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://transcribe:${DB_PASSWORD:-transcribe}@db:5432/transcribe
      API_URL: http://api:8000
      BOT_PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      - api
      - db
    profiles:
      - bot

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - bot
    profiles:
      - prod

volumes:
  pgdata:
  caddy_data:
  caddy_config:
